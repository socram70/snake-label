services:
  snake-label:
    image: ghcr.io/socram70/snake-label:latest
    ports:
      - "8012:80"
    restart: unless-stopped

  brother-ql-web:
    image: ghcr.io/socram70/brother_ql_web:latest
    ports:
      - "8013:8013"
    volumes:
      # Copy brother_ql_web_instance/application.py.example to application.py and adjust before starting
      - ./brother_ql_web_instance/application.py:/app/instance/application.py:ro
    restart: unless-stopped
    # For USB printers, uncomment and adjust the line below:
    # devices:
    #   - /dev/usb/lp0:/dev/usb/lp0
